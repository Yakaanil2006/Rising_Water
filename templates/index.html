<!DOCTYPE html>
<html>

<head>

    <title>Flood Prediction</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>🌊 Rising Water</h1>

<h2>Flood Prediction System</h2>

<form action="/predict" method="POST">

<input type="number" name="Temp" placeholder="Temperature" required>

<input type="number" name="Humidity" placeholder="Humidity" required>

<input type="number" name="Cloud_Cover" placeholder="Cloud Cover" required>

<input type="number" step="0.01" name="ANNUAL" placeholder="Annual Rainfall" required>

<input type="number" step="0.01" name="Jan_Feb" placeholder="Jan-Feb" required>

<input type="number" step="0.01" name="Mar_May" placeholder="Mar-May" required>

<input type="number" step="0.01" name="Jun_Sep" placeholder="Jun-Sep" required>

<input type="number" step="0.01" name="Oct_Dec" placeholder="Oct-Dec" required>

<input type="number" step="0.01" name="avgjune" placeholder="Average June Rainfall" required>

<input type="number" step="0.01" name="sub" placeholder="Subdivision Rainfall (mm)" required>

<button type="submit">
Predict Flood
</button>

</form>

</div>

</body>
</html>
